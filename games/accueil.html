<!DOCTYPE html>
<html lang="fr-CH">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="../assets/logo.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accueil - AH</title>
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/utilities.css">
  <link rel="stylesheet" href="../css/pages/accueil.css">
</head>
<body>
  <div id="header-slot"></div>
  <div id="sidebar-slot"></div>

  <div class="layout">
    <main class="main">
      <div class="container">

        <!-- Prochaine etape -->
        <div class="next-card fade-up">
          <div class="next-card-body">
            <div class="next-card-label">Prochaine etape</div>
            <div class="next-card-title" id="nextExerciseName">Chargement...</div>
            <p class="next-card-desc" id="nextExerciseText">La meilleure suite pour continuer.</p>
          </div>
          <a class="btn btn-primary btn-lg" id="nextExerciseLink" href="#">Commencer</a>
        </div>

        <!-- Grille d'exercices -->
        <section class="parcours-section fade-up delay-1" id="parcours">
          <div class="parcours-head">
            <h2 class="section-heading">Choisir une activite</h2>
            <div class="category-chips" id="categoryChips"></div>
          </div>
          <div class="theme-filter-bar" id="themeFilterBar"></div>
          <div class="level-cards" id="exerciseCards"></div>
        </section>

        <div class="footer-info fade-up delay-2">
          <p>
            Resultats sur cet appareil ·
            <a href="evaluations.html">Mes resultats</a> ·
            <a href="autoevaluation.html">Autoevaluation</a> ·
            <a href="donnees.html">Donnees</a>
          </p>
        </div>

      </div>
    </main>
    <div id="footer-slot"></div>
  </div>

  <script src="../js/score.js"></script>
  <script src="../js/exercises-config.js"></script>
  <script src="../js/stages.js"></script>
  <script src="../js/exercise-utils.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    'use strict';

    document.addEventListener('DOMContentLoaded', function () {
      renderAccueil();
    });

    var activeThemeFilter = null;

    function renderAccueil() {
      var config = window.EXERCISE_CONFIG || {};
      var orderedPages = Array.isArray(config.orderedPages) ? config.orderedPages : [];
      var meta = config.meta || {};
      var firstMeta = orderedPages[0] ? (meta[orderedPages[0]] || {}) : {};
      var nextExercise = (window.StageManager && StageManager.getNextRecommendedExercise())
        || (orderedPages[0] ? { page: orderedPages[0], name: firstMeta.name, href: firstMeta.href } : null);

      if (nextExercise) {
        setText('nextExerciseName', nextExercise.name || 'Commencer');
        var link = document.getElementById('nextExerciseLink');
        if (link) link.href = nextExercise.href || (nextExercise.page + '.html');
      } else {
        setText('nextExerciseName', 'Choisissez une activite');
        setText('nextExerciseText', 'Parcourez les exercices ci-dessous pour commencer.');
      }

      renderCategoryChips(config, orderedPages);
      renderThemeFilterBar(config, orderedPages);
      renderGameCards(config, orderedPages, nextExercise);
    }

    function renderThemeFilterBar(config, orderedPages) {
      var bar = document.getElementById('themeFilterBar');
      if (!bar) return;
      var labels = window.LIFE_THEME_LABELS || {};
      var themes = window.LIFE_THEMES || [];
      var presentThemes = themes.filter(function (t) {
        return orderedPages.some(function (p) {
          var m = config.meta && config.meta[p];
          return m && Array.isArray(m.themes) && m.themes.includes(t);
        });
      });
      if (presentThemes.length === 0) { bar.style.display = 'none'; return; }
      bar.style.display = '';
      var allBtn = '<button class="theme-chip' + (!activeThemeFilter ? ' active' : '') +
        '" data-theme="" type="button">Tous</button>';
      var themeBtns = presentThemes.map(function (t) {
        var info = labels[t] || { label: t, icon: '●' };
        return '<button class="theme-chip' + (activeThemeFilter === t ? ' active' : '') +
          '" data-theme="' + escapeHTML(t) + '" type="button">' +
          escapeHTML(info.icon) + ' ' + escapeHTML(info.label) + '</button>';
      }).join('');
      bar.innerHTML = allBtn + themeBtns;
      bar.querySelectorAll('.theme-chip').forEach(function (btn) {
        btn.addEventListener('click', function () {
          activeThemeFilter = btn.dataset.theme || null;
          var cfg = window.EXERCISE_CONFIG || {};
          var pages = Array.isArray(cfg.orderedPages) ? cfg.orderedPages : [];
          renderThemeFilterBar(cfg, pages);
          renderGameCards(cfg, pages,
            (window.StageManager && StageManager.getNextRecommendedExercise()) || null);
        });
      });
    }
  </script>
</body>
</html>
