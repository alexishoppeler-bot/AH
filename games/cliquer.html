<!DOCTYPE html>
<html lang="fr-CH">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clic souris - AH</title>
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/utilities.css">
  <style>
    /* ── Parcours ── */
    .parcours-header {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 18px; flex-wrap: wrap;
    }
    .parcours-header .btn {
      margin-left: auto;
    }
    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid color-mix(in srgb, var(--accent) 35%, var(--border));
      background: color-mix(in srgb, var(--accent) 10%, var(--surface));
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.4px;
      color: var(--text1);
    }
    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
      animation: live-pulse 1.4s infinite;
    }
    @keyframes live-pulse {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
      70% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }
    .step-indicator {
      display: flex; gap: 6px;
    }
    .step-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--border); transition: background 0.3s;
    }
    .step-dot.done    { background: var(--success); }
    .step-dot.current { background: var(--accent); }

    /* ── Arène ── */
    .arena {
      position: relative;
      height: 300px;
      background: var(--bg2);
      border-radius: var(--r-lg);
      border: 2px solid var(--accent);
      overflow: hidden;
    }
    .arena-msg {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--text3); font-size: 14px; pointer-events: none;
    }
    .arena-counter {
      position: absolute; bottom: 12px; right: 14px;
      font-size: 12px; color: var(--text3); font-weight: 600;
    }

    /* ── Targets ── */
    .target {
      position: absolute;
      width: 60px; height: 60px;
      border-radius: 50%;
      display: none;
      align-items: center; justify-content: center;
      font-size: 26px;
      cursor: pointer;
      user-select: none;
      box-shadow: var(--shadow-accent);
      transition: transform 0.1s;
      animation: pop-in 0.18s ease;
    }
    .target:hover { transform: scale(1.08); }
    @keyframes pop-in { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .target.hit { animation: hit-flash 0.2s ease; }
    @keyframes hit-flash { 0%,100% { transform: scale(1); } 50% { transform: scale(1.3); } }

    /* ── KPI ── */
    .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
    .kpi-card { background: var(--surface); border-radius: var(--r-lg); padding: 16px;
                text-align: center; border: 1px solid var(--border); }
    .kpi-val  { font-size: 22px; font-weight: 700; color: var(--accent); }
    .kpi-lbl  { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; margin-top: 2px; }

    /* ── Drag & drop ── */
    .drag-item {
      padding: 8px 14px; border-radius: 999px; font-size: 14px;
      border: 2px solid var(--border); background: var(--surface);
      cursor: grab; user-select: none;
      transition: transform 0.15s, opacity 0.15s;
    }
    .drag-item:hover    { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .drag-item.dragging { opacity: 0.4; cursor: grabbing; }
    .drag-item.correct  { background: var(--success); color: #fff; border-color: var(--success); cursor: default; }
    .drag-item.wrong    { background: var(--danger);  color: #fff; border-color: var(--danger);  cursor: default; }
    .drag-zone {
      min-height: 100px; border: 2px dashed var(--border); border-radius: var(--r-lg);
      padding: 12px; display: flex; flex-wrap: wrap; gap: 8px; background: var(--bg2);
      transition: border-color 0.2s, background 0.2s;
    }
    .drag-zone.over { border-color: var(--accent); background: color-mix(in srgb,var(--accent) 8%,var(--bg2)); }

    /* ── Stat bar ── */
    .stat-bar { display: flex; align-items: center; gap: 12px; margin-top: 12px; font-size: 13px; color: var(--text2); flex-wrap: wrap; }
    .stat-pill { display: inline-flex; gap: 5px; align-items: center; padding: 4px 12px;
                 border-radius: 999px; background: var(--bg2); border: 1px solid var(--border); font-weight: 600; }

    /* ── Miss flash ── */
    .miss-cross {
      position: absolute; pointer-events: none; font-size: 22px;
      animation: miss-anim 0.5s ease forwards;
    }
    @keyframes miss-anim {
      0%   { opacity:1; transform: scale(1) translateY(0); }
      100% { opacity:0; transform: scale(1.4) translateY(-24px); }
    }

    /* ── Sélection de texte ── */
    .sel-wrap {
      background: var(--bg2); border: 2px solid var(--accent);
      border-radius: var(--r-lg); padding: 22px 26px;
      font-size: 17px; line-height: 2;
      cursor: text; user-select: text;
      position: relative;
    }
    .sel-target-word {
      background: color-mix(in srgb, var(--accent) 18%, transparent);
      border-radius: 4px; padding: 0 2px;
      border-bottom: 2px solid var(--accent);
      transition: background 0.3s;
    }
    .sel-target-word.validated {
      background: color-mix(in srgb, var(--success) 25%, transparent);
      border-bottom-color: var(--success);
    }
    .sel-consigne {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-lg); padding: 12px 16px;
      font-size: 14px; font-weight: 600; color: var(--text1);
      margin-bottom: 14px;
    }
    .sel-consigne .badge {
      background: var(--accent); color: #fff; border-radius: 50%;
      width: 24px; height: 24px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
    }
    .sel-feedback {
      margin-top: 10px; min-height: 20px;
      font-size: 13px; font-weight: 600; color: var(--success);
    }
    .sel-actions {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }
    .sel-actions .btn {
      padding: 8px 12px;
      font-size: 12px;
    }
    @keyframes flash-green {
      0%,100% { background: var(--bg2); }
      40%     { background: color-mix(in srgb, var(--success) 18%, var(--bg2)); }
    }
    .sel-wrap.flash { animation: flash-green 0.45s ease; }

    /* ── Transition entre étapes ── */
    .step-card { animation: fadein 0.3s ease; }
    @keyframes fadein { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }

    /* ── Fenêtre entraînement ── */
    .train-modal {
      width: min(920px, 96vw);
      text-align: left;
    }
    .train-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .train-title {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      color: var(--text1);
    }
    .train-instruction {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .train-kpis {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .train-kpi {
      font-size: 12px;
      font-weight: 700;
      border-radius: 999px;
      padding: 5px 11px;
      background: var(--bg2);
      border: 1px solid var(--border);
    }
    .train-board {
      position: relative;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .train-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 12px;
      min-height: 120px;
    }
    .train-box h4 {
      margin: 0 0 8px;
      font-size: 12px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .train-target {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: none;
      font-size: 30px;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      box-shadow: var(--shadow-accent);
    }
    .train-target:active { transform: scale(0.98); }
    .train-dd {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .train-drag {
      user-select: none;
      cursor: grab;
      border-radius: 10px;
      padding: 8px 10px;
      text-align: center;
      font-weight: 700;
      border: 1px solid var(--border);
      background: var(--surface);
    }
    .train-drop {
      min-height: 44px;
      border-radius: 10px;
      border: 2px dashed var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text2);
      font-size: 13px;
      background: color-mix(in srgb, var(--accent) 8%, var(--bg2));
    }
    .train-select-text {
      margin: 0;
      line-height: 1.9;
      user-select: text;
      cursor: text;
    }
    .train-note {
      width: 100%;
      min-height: 98px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text1);
      padding: 10px;
      resize: vertical;
      font: inherit;
      font-size: 14px;
    }
    .train-feedback {
      margin-top: 10px;
      min-height: 20px;
      font-size: 13px;
      font-weight: 700;
      color: var(--success);
    }
    .train-menu {
      position: absolute;
      z-index: 20;
      min-width: 140px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow-lg);
      display: none;
      overflow: hidden;
    }
    .train-menu button {
      width: 100%;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 9px 10px;
      background: transparent;
      color: var(--text1);
      text-align: left;
      cursor: pointer;
      font-size: 13px;
    }
    .train-menu button:last-child { border-bottom: none; }
    .train-menu button:hover { background: var(--bg2); }
  </style>
</head>
<body>
  <div id="header-slot"></div>
  <div id="sidebar-slot"></div>

  <div class="layout">
    <main class="main">
      <div class="container">

        <div class="page-header fade-up">
          <div class="page-icon">🖱️</div>
          <h1>Clic souris</h1>
          <p>Jeux d'étapes en boucle : une consigne aléatoire à chaque manche.</p>
        </div>

        <!-- KPI global -->
        <div class="kpi-grid fade-up delay-1">
          <div class="kpi-card">
            <div class="kpi-val" style="color:var(--success)" id="sc-done">0</div>
            <div class="kpi-lbl">Réussis</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-val" style="color:var(--danger)" id="sc-miss">0</div>
            <div class="kpi-lbl">Ratés</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-val" id="sc-xp">0 XP</div>
            <div class="kpi-lbl">XP gagné</div>
          </div>
        </div>

        <!-- Header jeu -->
        <div class="parcours-header fade-up delay-2">
          <span class="live-pill" id="step-label"><span class="live-dot" aria-hidden="true"></span> Manche en cours</span>
          <button class="btn btn-secondary" id="btn-next-random">Nouvelle manche</button>
        </div>

        <!-- Zone de l'étape courante -->
        <div class="fade-up delay-2" id="step-zone"></div>

      </div>
    </main>
    <div id="footer-slot"></div>
  </div>

  <!-- Modal fin d'étape -->
  <div class="modal-overlay" id="modal-step">
    <div class="modal">
      <div class="modal-icon" id="stepEmoji">🎉</div>
      <div class="modal-title" id="stepTitle"></div>
      <div class="modal-text"  id="stepText"></div>
      <div style="margin-top:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <button class="btn btn-primary" id="btn-next-step">Manche suivante →</button>
        <button class="btn btn-secondary" id="btn-retry-step">Rejouer cette manche</button>
      </div>
    </div>
  </div>

  <script src="../js/data/cliquer-data.js"></script>
  <script src="../js/score.js"></script>
  <script src="../js/exercises-config.js"></script>
  <script src="../js/stages.js"></script>
  <script src="../js/exercise-utils.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/ui.js"></script>
  <script>
  'use strict';
  const PAGE_ID = 'cliquer';

  /* ── Score global ── */
  let totalDone = 0, totalMiss = 0, totalXP = 0;
  function addGlobalScore(d, m, xp) {
    totalDone += d; totalMiss += m;
    totalXP = Math.max(0, totalXP + xp);
    document.getElementById('sc-done').textContent = totalDone;
    document.getElementById('sc-miss').textContent = totalMiss;
    document.getElementById('sc-xp').textContent   = totalXP + ' XP';
    recordExerciseProgress(PAGE_ID, { correct: d, typed: d + m, errors: m, xp: Math.max(0, xp) });
  }

  /* ── Helpers ── */
  function rndPos(arenaEl, size = 60) {
    const w = arenaEl.clientWidth  - size - 10;
    const h = arenaEl.clientHeight - size - 10;
    return { x: Math.max(5, Math.floor(Math.random() * w)),
             y: Math.max(5, Math.floor(Math.random() * h)) };
  }
  function spawnMiss(arena, x, y) {
    const el = document.createElement('div');
    el.className = 'miss-cross'; el.textContent = '✗';
    el.style.left = x + 'px'; el.style.top = y + 'px';
    arena.appendChild(el);
    setTimeout(() => el.remove(), 500);
  }

  /* ══════════════════════════════════════════════════════
     DÉFINITION DES 5 ÉTAPES
  ══════════════════════════════════════════════════════ */
  const STEPS = [

    /* ── 1. CLIC GAUCHE ── */
    {
      id: 'left',
      build() {
        const TOTAL = 12;
        let remaining, active, reactTimes, shownAt;

        const html = `
          <div class="card step-card">
            <div class="card-title">👆 Étape 1 — Clic gauche</div>
            <p class="mb-16" style="font-size:13px;color:var(--text2);">
              Clique sur la cible dès qu'elle apparaît. Évite les faux clics.
            </p>
            <div class="arena" id="l-arena">
              <div class="arena-msg" id="l-msg">Prêt…</div>
              <div class="target" id="l-tgt" style="background:var(--gradient);">🎯</div>
              <div class="arena-counter" id="l-cnt"></div>
            </div>
            <div class="stat-bar mt-12">
              <span class="stat-pill">✅ <span id="l-ok">0</span>/${TOTAL}</span>
              <span class="stat-pill">❌ <span id="l-err">0</span></span>
              <span class="stat-pill" id="l-react-lbl" style="display:none">⚡ <span id="l-react">—</span> ms moy.</span>
            </div>
          </div>`;

        return {
          html,
          start() {
            const arena = document.getElementById('l-arena');
            const tgt   = document.getElementById('l-tgt');
            const cnt   = document.getElementById('l-cnt');
            const msg   = document.getElementById('l-msg');
            const okEl  = document.getElementById('l-ok');
            const errEl = document.getElementById('l-err');
            const reactEl  = document.getElementById('l-react');
            const reactLbl = document.getElementById('l-react-lbl');

            remaining = TOTAL; active = true; reactTimes = [];
            okEl.textContent = 0; errEl.textContent = 0;
            reactLbl.style.display = 'none';
            msg.style.display = 'none';
            cnt.textContent = 'Restants : ' + remaining;
            promoteExerciseStatus(PAGE_ID, 'in_progress');

            function place() {
              const p = rndPos(arena);
              tgt.style.left = p.x + 'px'; tgt.style.top = p.y + 'px';
              tgt.style.display = 'flex';
              tgt.style.animation = 'none'; void tgt.offsetWidth; tgt.style.animation = '';
              shownAt = performance.now();
            }

            tgt.onclick = e => {
              if (!active) return;
              e.stopPropagation();
              reactTimes.push(Math.round(performance.now() - shownAt));
              remaining--;
              okEl.textContent = reactTimes.length;
              cnt.textContent = 'Restants : ' + remaining;
              tgt.classList.add('hit'); setTimeout(() => tgt.classList.remove('hit'), 200);
              addGlobalScore(1, 0, 2);
              if (remaining <= 0) { tgt.style.display = 'none'; finish(); }
              else setTimeout(place, 350);
            };

            arena.addEventListener('click', e => {
              if (!active || e.target === tgt || tgt.contains(e.target)) return;
              const r = arena.getBoundingClientRect();
              spawnMiss(arena, e.clientX - r.left - 12, e.clientY - r.top - 12);
              errEl.textContent = +errEl.textContent + 1;
              addGlobalScore(0, 1, -1);
            });

            function finish() {
              active = false;
              const avg = reactTimes.length
                ? Math.round(reactTimes.reduce((a, b) => a + b, 0) / reactTimes.length) : 0;
              if (avg) { reactLbl.style.display = 'inline-flex'; reactEl.textContent = avg; }
              const ok = reactTimes.length;
              openStepModal('🎯', 'Clic gauche maîtrisé !',
                `Réussis : ${ok}/${TOTAL} · Temps moyen : ${avg} ms`,
                ok >= TOTAL * 0.5);
            }

            place();
          }
        };
      }
    },

    /* ── 2. CLIC DROIT ── */
    {
      id: 'right',
      build() {
        const TOTAL = 10;
        let remaining, active;

        const html = `
          <div class="card step-card">
            <div class="card-title">🖱️ Étape 2 — Clic droit</div>
            <p class="mb-16" style="font-size:13px;color:var(--text2);">
              Fais un <strong>clic droit</strong> sur la cible. Le menu contextuel est bloqué ici.
            </p>
            <div class="arena" id="r-arena">
              <div class="arena-msg" id="r-msg" style="display:none"></div>
              <div class="target" id="r-tgt" style="background:linear-gradient(135deg,#f59e0b,#f87171);cursor:context-menu;">🎯</div>
              <div class="arena-counter" id="r-cnt"></div>
            </div>
            <div class="stat-bar mt-12">
              <span class="stat-pill">✅ <span id="r-ok">0</span>/${TOTAL}</span>
              <span class="stat-pill">❌ <span id="r-err">0</span></span>
            </div>
          </div>`;

        return {
          html,
          start() {
            const arena = document.getElementById('r-arena');
            const tgt   = document.getElementById('r-tgt');
            const cnt   = document.getElementById('r-cnt');
            const okEl  = document.getElementById('r-ok');
            const errEl = document.getElementById('r-err');

            remaining = TOTAL; active = true;
            okEl.textContent = 0; errEl.textContent = 0;
            cnt.textContent = 'Restants : ' + remaining;
            promoteExerciseStatus(PAGE_ID, 'in_progress');

            function place() {
              const p = rndPos(arena);
              tgt.style.left = p.x + 'px'; tgt.style.top = p.y + 'px';
              tgt.style.display = 'flex';
              tgt.style.animation = 'none'; void tgt.offsetWidth; tgt.style.animation = '';
            }

            arena.addEventListener('contextmenu', e => {
              e.preventDefault();
              if (!active) return;
              if (e.target === tgt || tgt.contains(e.target)) {
                remaining--;
                okEl.textContent = +okEl.textContent + 1;
                cnt.textContent = 'Restants : ' + remaining;
                addGlobalScore(1, 0, 2);
                tgt.classList.add('hit'); setTimeout(() => tgt.classList.remove('hit'), 200);
                if (remaining <= 0) finish(); else setTimeout(place, 350);
              } else {
                const r = arena.getBoundingClientRect();
                spawnMiss(arena, e.clientX - r.left - 12, e.clientY - r.top - 12);
                errEl.textContent = +errEl.textContent + 1;
                addGlobalScore(0, 1, -1);
              }
            });

            // Clic gauche sur la cible = mauvaise action (feedback explicite)
            arena.addEventListener('click', e => {
              if (!active) return;
              if (e.target === tgt || tgt.contains(e.target)) {
                errEl.textContent = +errEl.textContent + 1;
                addGlobalScore(0, 1, -1);
                const r = arena.getBoundingClientRect();
                spawnMiss(arena, e.clientX - r.left - 12, e.clientY - r.top - 12);
              }
            });

            function finish() {
              active = false;
              const ok = +okEl.textContent;
              openStepModal('🖱️', 'Clic droit maîtrisé !',
                `Réussis : ${ok}/${TOTAL}`, ok >= TOTAL * 0.5);
            }

            place();
          }
        };
      }
    },

    /* ── 3. DOUBLE CLIC ── */
    {
      id: 'dbl',
      build() {
        const TOTAL = 8;
        let done, errs, active;

        const html = `
          <div class="card step-card">
            <div class="card-title">⚡ Étape 3 — Double clic</div>
            <p class="mb-16" style="font-size:13px;color:var(--text2);">
              Double-clique sur la cible.
            </p>
            <div class="arena" id="d-arena" style="display:flex;align-items:center;justify-content:center;">
              <div class="target" id="d-tgt"
                   style="position:static;background:linear-gradient(135deg,#7c5ff5,#4f8ef7);width:90px;height:90px;font-size:32px;">⚡</div>
              <div class="arena-msg" id="d-msg" style="display:none;"></div>
              <div class="arena-counter" id="d-cnt"></div>
            </div>
            <div class="stat-bar mt-12">
              <span class="stat-pill">✅ <span id="d-ok">0</span>/${TOTAL}</span>
              <span class="stat-pill">❌ <span id="d-err">0</span></span>
            </div>
          </div>`;

        return {
          html,
          start() {
            const arena = document.getElementById('d-arena');
            const tgt   = document.getElementById('d-tgt');
            const msg   = document.getElementById('d-msg');
            const cnt   = document.getElementById('d-cnt');
            const okEl  = document.getElementById('d-ok');
            const errEl = document.getElementById('d-err');

            done = 0; errs = 0; active = true;
            okEl.textContent = 0; errEl.textContent = 0;
            promoteExerciseStatus(PAGE_ID, 'in_progress');

            function next() {
              if (done >= TOTAL) { finish(); return; }
              msg.style.display = 'none';
              tgt.style.display = 'flex';
              tgt.style.animation = 'none'; void tgt.offsetWidth; tgt.style.animation = '';
              cnt.textContent = `${done + 1}/${TOTAL}`;
              tgt.onclick = () => {
                errs++;
                errEl.textContent = errs;
                msg.style.display = 'flex';
                msg.textContent = 'Double-clic requis';
                addGlobalScore(0, 1, -1);
              };
              tgt.ondblclick = () => {
                done++; okEl.textContent = done;
                tgt.style.display = 'none';
                msg.style.display = 'flex'; msg.textContent = '⚡ Super !';
                addGlobalScore(1, 0, 3);
                setTimeout(next, 700);
              };
            }

            function finish() {
              active = false;
              openStepModal('⚡', 'Double clic maîtrisé !',
                `Réussis : ${done}/${TOTAL} · Ratés : ${errs}`, done >= TOTAL * 0.5);
            }

            next();
          }
        };
      }
    },

    /* ── 4. DRAG & DROP ── */
    {
      id: 'drag',
      build() {
        const ITEMS = window.CLIQUER_DATA.dragItems;
        let draggingEl, total, placed;

        const html = `
          <div class="card step-card">
            <div class="card-title">🔀 Étape 4 — Glisser-déposer</div>
            <p class="mb-16" style="font-size:13px;color:var(--text2);">
              Glisse chaque élément dans sa catégorie : <strong>Matériel</strong> ou <strong>Logiciel</strong>.
            </p>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;">
              <div>
                <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;margin-bottom:8px;">À classer</div>
                <div class="drag-zone" id="dr-src" style="flex-direction:column;"></div>
              </div>
              <div>
                <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;margin-bottom:8px;">🖥️ Matériel</div>
                <div class="drag-zone" id="dr-hw" data-cat="hw"></div>
              </div>
              <div>
                <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;margin-bottom:8px;">💿 Logiciel</div>
                <div class="drag-zone" id="dr-sw" data-cat="sw"></div>
              </div>
            </div>
            <div class="stat-bar mt-12">
              <span class="stat-pill">✅ <span id="dr-ok">0</span></span>
              <span class="stat-pill">❌ <span id="dr-err">0</span></span>
              <span style="font-size:13px;color:var(--text2);" id="dr-remain"></span>
            </div>
          </div>`;

        return {
          html,
          start() {
            const src    = document.getElementById('dr-src');
            const hwEl   = document.getElementById('dr-hw');
            const swEl   = document.getElementById('dr-sw');
            const okEl   = document.getElementById('dr-ok');
            const errEl  = document.getElementById('dr-err');
            const remEl  = document.getElementById('dr-remain');

            draggingEl = null;
            total = ITEMS.length; placed = 0;
            okEl.textContent = 0; errEl.textContent = 0;
            remEl.textContent = `0/${total} classés`;
            promoteExerciseStatus(PAGE_ID, 'in_progress');

            const shuffled = [...ITEMS].sort(() => Math.random() - 0.5);
            shuffled.forEach(item => {
              const el = document.createElement('div');
              el.className = 'drag-item';
              el.textContent = item.label;
              el.draggable = true;
              el.dataset.cat = item.cat;
              el.addEventListener('dragstart', e => {
                draggingEl = el; el.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
              });
              el.addEventListener('dragend', () => {
                if (draggingEl) draggingEl.classList.remove('dragging');
                draggingEl = null;
              });
              src.appendChild(el);
            });

            [hwEl, swEl].forEach(zone => {
              zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('over'); });
              zone.addEventListener('dragleave', ()  => zone.classList.remove('over'));
              zone.addEventListener('drop', e => {
                e.preventDefault(); zone.classList.remove('over');
                if (!draggingEl) return;
                const correct = zone.dataset.cat === draggingEl.dataset.cat;
                draggingEl.classList.remove('dragging');
                draggingEl.draggable = false;
                if (correct) {
                  draggingEl.classList.add('correct');
                  okEl.textContent = +okEl.textContent + 1;
                  addGlobalScore(1, 0, 2);
                } else {
                  draggingEl.classList.add('wrong');
                  errEl.textContent = +errEl.textContent + 1;
                  addGlobalScore(0, 1, -1);
                }
                zone.appendChild(draggingEl);
                draggingEl = null;
                placed++;
                remEl.textContent = `${placed}/${total} classés`;
                if (placed >= total) {
                  const ok = +okEl.textContent, err = +errEl.textContent;
                  openStepModal('🔀', 'Glisser-déposer terminé !',
                    `${ok} corrects · ${err} erreurs`, ok >= total * 0.5);
                }
              });
            });
          }
        };
      }
    },

    /* ── 5. SÉLECTION DE TEXTE ── */
    {
      id: 'sel',
      build() {
        // Texte brut (sans balises) servant à la comparaison pour "tout sélectionner"
        const PLAIN = 'La souris est un outil très utile. Elle sert à cliquer sur des éléments et à sélectionner du texte.';

        const TASKS = [
          {
            label : 'Sélectionne le mot  « souris »',
            // on teste si la sélection contient exactement ce mot
            check : sel => norm(sel) === 'souris'
          },
          {
            label : 'Sélectionne les mots  « cliquer sur des éléments »',
            check : sel => norm(sel) === 'cliquer sur des éléments'
          },
          {
            label : 'Sélectionne tout le texte  (Ctrl+A ou cliquer-glisser)',
            check : sel => norm(sel) === norm(PLAIN)
          },
        ];

        function norm(s) {
          return s.replace(/\s+/g, ' ').trim()
                  .replace(/[\u2019\u2018]/g, "'");
        }

        let step, okCount, cooldown, selTimer, currentTask;
        let onSelectionChange = null;

        const html = `
          <div class="card step-card">
            <div class="card-title">✍️ Étape 5 — Sélection de texte</div>
            <p class="mb-16" style="font-size:13px;color:var(--text2);">
              Clique et glisse pour sélectionner du texte. Suis les consignes.
            </p>
            <div class="sel-consigne" id="sel-badge">
              <span class="badge" id="sel-num">1</span>
              <span id="sel-task">…</span>
            </div>
            <div class="sel-wrap" id="sel-block" tabindex="0">La souris est un outil très utile. Elle sert à <mark id="sel-m1" class="sel-target-word">cliquer sur des éléments</mark> et à sélectionner du texte.</div>
            <div class="sel-feedback" id="sel-fb"></div>
            <div class="stat-bar mt-12">
              <span class="stat-pill">✅ <span id="sel-ok">0</span>/3</span>
              <span class="stat-pill" id="sel-step-pill">Sous-tâche <span id="sel-sc">1</span>/3</span>
            </div>
          </div>`;

        return {
          html,
          start() {
            const block  = document.getElementById('sel-block');
            const taskEl = document.getElementById('sel-task');
            const numEl  = document.getElementById('sel-num');
            const fbEl   = document.getElementById('sel-fb');
            const okEl   = document.getElementById('sel-ok');
            const stepPill = document.getElementById('sel-step-pill');

            step = 0; okCount = 0; cooldown = false;
            currentTask = TASKS[0];
            okEl.textContent = 0;
            promoteExerciseStatus(PAGE_ID, 'in_progress');

            function setStepPill(stepNumber) {
              stepPill.innerHTML = 'Sous-tâche <span id="sel-sc"></span>/3';
              const scNode = document.getElementById('sel-sc');
              if (scNode) scNode.textContent = stepNumber;
            }

            function showTask() {
              if (step >= TASKS.length) { finish(); return; }
              currentTask = TASKS[step];
              taskEl.textContent = currentTask.label;
              numEl.textContent  = step + 1;
              setStepPill(step + 1);

              fbEl.textContent   = '';
              window.getSelection().removeAllRanges();
            }

            function check() {
              if (cooldown) return;
              const sel = window.getSelection();
              if (!sel || sel.rangeCount === 0 || sel.toString().trim() === '') return;

              // Vérifier que la sélection est dans le bloc
              const range = sel.getRangeAt(0);
              if (!block.contains(range.commonAncestorContainer)) return;

              const selStr = sel.toString();
              if (currentTask.check(selStr)) {
                cooldown = true;
                okCount++; okEl.textContent = okCount;
                addGlobalScore(1, 0, 3);
                fbEl.textContent = '✅ Parfait !';
                block.classList.add('flash');
                setTimeout(() => block.classList.remove('flash'), 450);
                step++;
                setTimeout(() => { cooldown = false; showTask(); }, 900);
              }
            }

            block.addEventListener('mouseup', () => {
              clearTimeout(selTimer);
              selTimer = setTimeout(check, 60);
            });

            // selectionchange pour couvrir Ctrl+A et touch
            onSelectionChange = () => {
              clearTimeout(selTimer);
              selTimer = setTimeout(check, 80);
            };
            document.addEventListener('selectionchange', onSelectionChange);

            // Ctrl+A → sélectionne uniquement le contenu du bloc
            block.addEventListener('keydown', e => {
              if ((e.ctrlKey || e.metaKey) && e.key === 'a') {
                e.preventDefault();
                const r = document.createRange();
                r.selectNodeContents(block);
                const s = window.getSelection();
                s.removeAllRanges(); s.addRange(r);
                setTimeout(check, 80);
              }
            });

            function finish() {
              promoteExerciseStatus(PAGE_ID, 'in_progress');
              // Fermer les listeners globaux proprement
              if (onSelectionChange) document.removeEventListener('selectionchange', onSelectionChange);
              openStepModal('✍️', 'Sélection de texte maîtrisée !',
                `${okCount}/3 sous-tâches validées`, okCount >= 2);
            }

            showTask();
          }
        };
      }
    }
  ];

  /* ══════════════════════════════════════════════════════
     MOTEUR DU PARCOURS
  ══════════════════════════════════════════════════════ */
  let currentStep = 0;
  let currentStepObj = null; // { html, start }
  let lastStep = -1;

  const stepZone = document.getElementById('step-zone');
  const labelEl = document.getElementById('step-label');
  const btnNextRandom = document.getElementById('btn-next-random');
  const modalStep = document.getElementById('modal-step');

  function pickRandomStep() {
    if (STEPS.length <= 1) return 0;
    let idx = Math.floor(Math.random() * STEPS.length);
    if (idx === lastStep) idx = (idx + 1) % STEPS.length;
    return idx;
  }

  function loadStep(idx) {
    currentStep = idx;
    lastStep = idx;
    labelEl.innerHTML = '<span class="live-dot" aria-hidden="true"></span> Manche en cours';
    const def = STEPS[idx];
    currentStepObj = def.build();
    stepZone.innerHTML = currentStepObj.html;
    requestAnimationFrame(() => currentStepObj.start());
  }

  function loadRandomStep() {
    loadStep(pickRandomStep());
  }

  function openStepModal(icon, title, text, confetti) {
    document.getElementById('stepEmoji').textContent = icon;
    document.getElementById('stepTitle').textContent = title;
    document.getElementById('stepText').textContent  = text;
    modalStep.classList.add('show');
    if (confetti) launchConfetti();
  }

  btnNextRandom.addEventListener('click', () => {
    loadRandomStep();
  });

  // Bouton "Manche suivante"
  document.getElementById('btn-next-step').addEventListener('click', () => {
    modalStep.classList.remove('show');
    loadRandomStep();
  });

  // Bouton "Rejouer cette manche"
  document.getElementById('btn-retry-step').addEventListener('click', () => {
    modalStep.classList.remove('show');
    loadStep(currentStep);
  });

  // Afficher les règles XP et lancer une manche aléatoire
  showXPRules('Cliquer');
  loadStep(0);
  </script>
</body>
</html>
