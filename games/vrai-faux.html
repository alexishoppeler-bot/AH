<!DOCTYPE html>
<html lang="fr-CH">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vrai ou Faux - AH</title>
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/utilities.css">
  <style>
    /* === VRAI OU FAUX === */
    .vf-zone {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 32px;
      text-align: center;
    }

    .quiz-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .quiz-progress-label { font-size: 13px; color: var(--text2); }
    .quiz-progress-label strong { color: var(--text); }

    .series-progress { margin-bottom: 28px; }

    /* Carte affirmation */
    .vf-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 32px 28px;
      margin-bottom: 32px;
      transition: border-color 0.3s, background 0.3s;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .vf-card.result-vrai {
      border-color: var(--success);
      background: rgba(52,211,153,0.06);
    }
    .vf-card.result-faux {
      border-color: var(--danger);
      background: rgba(248,113,113,0.06);
    }

    .vf-category { margin-bottom: 4px; }

    .vf-statement {
      font-family: var(--font-head);
      font-size: 19px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.5;
    }

    /* Boutons Vrai / Faux */
    .vf-buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .btn-vrai {
      min-width: 160px;
      padding: 18px 32px;
      background: linear-gradient(135deg, #34d399, #059669);
      color: white;
      border: none;
      border-radius: var(--r-lg);
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 4px 20px rgba(52,211,153,0.3);
      letter-spacing: 0.5px;
    }
    .btn-vrai:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(52,211,153,0.4); }
    .btn-vrai:active:not(:disabled) { transform: translateY(1px); }

    .btn-faux {
      min-width: 160px;
      padding: 18px 32px;
      background: linear-gradient(135deg, #f87171, #dc2626);
      color: white;
      border: none;
      border-radius: var(--r-lg);
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 4px 20px rgba(248,113,113,0.3);
      letter-spacing: 0.5px;
    }
    .btn-faux:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(248,113,113,0.4); }
    .btn-faux:active:not(:disabled) { transform: translateY(1px); }

    .btn-vrai:disabled, .btn-faux:disabled { opacity: 0.4; cursor: default; transform: none !important; }

    /* Résultat après réponse */
    .vf-result {
      display: none;
      padding: 14px 20px;
      border-radius: var(--r-md);
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 16px;
      text-align: left;
    }
    .vf-result.ok {
      display: block;
      background: rgba(52,211,153,0.08);
      border: 1px solid rgba(52,211,153,0.25);
      color: var(--text2);
    }
    .vf-result.err {
      display: block;
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      color: var(--text2);
    }

    .vf-feedback {
      font-family: var(--font-head);
      font-size: 17px;
      font-weight: 700;
      min-height: 28px;
      margin-bottom: 12px;
    }
    .vf-feedback.ok  { color: var(--success); }
    .vf-feedback.err { color: var(--danger); }

    /* Streak bar */
    .streak-bar {
      display: flex;
      gap: 5px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .streak-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border);
      transition: all 0.2s;
    }
    .streak-dot.ok   { background: var(--success); border-color: var(--success); }
    .streak-dot.err  { background: var(--danger);  border-color: var(--danger); }
    .streak-dot.skip { background: var(--text3);   border-color: var(--text3); }

    /* Raccourcis */
    .key-hint {
      font-size: 11px;
      color: var(--text3);
      margin-top: 8px;
    }
    .key-hint kbd {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 11px;
    }

    .vf-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* Résultats */
    .result-zone { display: none; }
    .result-zone.show { display: block; }
    .game-zone.hidden { display: none; }

    /* Animation entrée de la carte */
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .vf-card { animation: slideIn 0.3s ease; }

    /* Animation shake */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }
    .shake { animation: shake 0.4s ease; }
  </style>
</head>
<body>
  <div id="header-slot"></div>
  <div id="sidebar-slot"></div>

  <div class="layout">
    <main class="main">
      <div class="container">

        <div class="page-header fade-up">
          <div class="page-icon">✅</div>
          <h1>Vrai ou Faux</h1>
          <p>Détermine si chaque affirmation est vraie ou fausse.</p>
        </div>

        <!-- KPIs -->
        <div class="kpi-grid fade-up delay-1">
          <div class="kpi-card">
            <div class="kpi-value" id="kpiCorrect">0</div>
            <div class="kpi-label">Corrects</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value" id="kpiErrors">0</div>
            <div class="kpi-label">Erreurs</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value" id="kpiXP">0</div>
            <div class="kpi-label">XP gagnés</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value" id="kpiStreak">0🔥</div>
            <div class="kpi-label">Série</div>
          </div>
        </div>

        <!-- Zone de jeu -->
        <div class="game-zone fade-up delay-2" id="gameZone">
          <div class="vf-zone">

            <div class="quiz-top">
              <div class="quiz-progress-label">
                Progression <strong id="qNum">0</strong> / <strong id="qTotal">0</strong>
              </div>
            </div>

            <div class="series-progress">
              <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
            </div>

            <!-- Historique visuel -->
            <div class="streak-bar" id="streakBar"></div>

            <!-- Carte -->
            <div class="vf-card" id="vfCard">
              <div class="vf-category">
                <span class="badge badge-blue" id="qCategory"></span>
              </div>
              <div class="vf-statement" id="qStatement"></div>
            </div>

            <!-- Feedback -->
            <div class="vf-feedback" id="vfFeedback"></div>

            <!-- Explication -->
            <div class="vf-result" id="vfResult"></div>

            <!-- Boutons -->
            <div class="vf-buttons">
              <button class="btn-vrai" id="btnVrai">Vrai</button>
              <button class="btn-faux" id="btnFaux">Faux</button>
            </div>

            <div class="vf-actions">
              <button class="btn btn-primary" id="btnNext" style="display:none;">Suivant</button>
            </div>

            <div class="key-hint">
              Raccourcis : <kbd>V</kbd> = Vrai &nbsp;|&nbsp; <kbd>F</kbd> = Faux &nbsp;|&nbsp; <kbd>Entrée</kbd> = Suivant
            </div>

          </div>
        </div>

        <!-- Résultats finaux -->
        <div class="result-zone fade-up" id="resultZone">
          <div class="card card-accent card-lg" style="text-align:center;">
            <div style="font-size:56px;margin-bottom:16px;" id="resEmoji">✅</div>
            <h2 style="font-family:var(--font-head);font-size:24px;font-weight:800;margin-bottom:8px;" id="resTitle">Session terminée !</h2>
            <p style="color:var(--text2);margin-bottom:28px;" id="resSubtitle"></p>
            <div class="kpi-grid" style="margin-bottom:28px;">
              <div class="kpi-card"><div class="kpi-value" id="resCorrect">0</div><div class="kpi-label">Corrects</div></div>
              <div class="kpi-card"><div class="kpi-value" id="resErrors">0</div><div class="kpi-label">Erreurs</div></div>
              <div class="kpi-card"><div class="kpi-value" id="resXP">0</div><div class="kpi-label">XP</div></div>
              <div class="kpi-card"><div class="kpi-value" id="resBestStreak">0</div><div class="kpi-label">Meilleure série</div></div>
            </div>
            <!-- Récapitulatif des erreurs -->
            <div id="errorRecap" style="text-align:left;margin-bottom:24px;display:none;">
              <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);margin-bottom:10px;">À retenir</div>
              <div id="errorList" style="display:flex;flex-direction:column;gap:8px;"></div>
            </div>
            <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
              <button class="btn btn-primary btn-lg" id="btnNextExercise">Exercice suivant</button>
              <button class="btn btn-secondary btn-lg" id="btnRestart">Rejouer</button>
              <a href="accueil.html" class="btn btn-secondary btn-lg">← Accueil</a>
            </div>
          </div>
        </div>

      </div>
    </main>
    <div id="footer-slot"></div>
  </div>

  <script src="../js/data/vrai-faux-data.js"></script>
  <script src="../js/score.js"></script>
  <script src="../js/exercises-config.js"></script>
  <script src="../js/stages.js"></script>
  <script src="../js/exercise-utils.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/ui.js"></script>
  <script>
  'use strict';

  /* =========================================================
     AFFIRMATIONS
     answer : true = vrai, false = faux
     explication : correction affichée après réponse
  ========================================================= */
  const STATEMENTS = window.VRAI_FAUX_DATA;

  const PAGE_ID      = 'vrai-faux';
  const Q_PER_SESSION = Array.isArray(STATEMENTS) ? STATEMENTS.length : 0;

  let session = {
    questions:   [],
    index:       0,
    correct:     0,
    errors:      0,
    xp:          0,
    typed:       0,
    streak:      0,
    bestStreak:  0,
    answered:    false,
    history:     [],  // 'ok' | 'err' | 'skip' pour chaque question
    wrongOnes:   [],  // questions ratées pour récap
  };

  let xpRulesShown = false;

  /* ===== UTILS ===== */
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  /* ===== INIT ===== */
  function startSession() {
    if (!Q_PER_SESSION) {
      showToast('Aucune question disponible dans les donnees.', 'error');
      return;
    }
    session.questions  = shuffle(STATEMENTS);
    session.index      = 0;
    session.correct    = 0;
    session.errors     = 0;
    session.xp         = 0;
    session.typed      = 0;
    session.streak     = 0;
    session.bestStreak = 0;
    session.answered   = false;
    session.history    = [];
    session.wrongOnes  = [];

    document.getElementById('resultZone').classList.remove('show');
    document.getElementById('gameZone').classList.remove('hidden');
    updateKPIs();

    // Afficher les règles XP seulement à la première session
    if (!xpRulesShown) {
      xpRulesShown = true;
      showXPRules('Vrai ou Faux');
    }

    loadQuestion();
  }

  /* ===== CHARGER UNE QUESTION ===== */
  function loadQuestion() {
    session.answered = false;

    const q = session.questions[session.index];

    document.getElementById('qNum').textContent       = session.index + 1;
    document.getElementById('qTotal').textContent     = session.questions.length;
    document.getElementById('qCategory').textContent  = q.category;
    document.getElementById('qStatement').textContent = q.statement;
    document.getElementById('vfFeedback').textContent = '';
    document.getElementById('vfFeedback').className   = 'vf-feedback';
    document.getElementById('vfResult').className     = 'vf-result';
    document.getElementById('vfResult').textContent   = '';
    document.getElementById('btnVrai').disabled       = false;
    document.getElementById('btnFaux').disabled       = false;
    document.getElementById('btnNext').style.display  = 'none';

    const card = document.getElementById('vfCard');
    card.classList.remove('result-vrai', 'result-faux');

    const pct = Math.round((session.index / session.questions.length) * 100);
    document.getElementById('progressFill').style.width = pct + '%';

    renderStreakBar();
  }

  /* ===== RÉPONDRE ===== */
  function answer(userSaysTrue) {
    if (session.answered) return;
    session.answered = true;
    session.typed++;

    const q    = session.questions[session.index];
    const isOk = (userSaysTrue === q.answer);

    document.getElementById('btnVrai').disabled = true;
    document.getElementById('btnFaux').disabled = true;

    const card = document.getElementById('vfCard');
    const fb   = document.getElementById('vfFeedback');

    if (isOk) {
      session.correct++;
      session.streak++;
      if (session.streak > session.bestStreak) session.bestStreak = session.streak;
      session.history.push('ok');

      const streakBonus = session.streak >= 3 ? 1 : 0;
      const xp = 2 + streakBonus;
      session.xp += xp;

      fb.textContent = '✅ Correct !' + (session.streak >= 3 ? ' 🔥 ' + session.streak + ' d\'affilée !' : '') + ' +' + xp + ' XP';
      fb.className   = 'vf-feedback ok';
      card.classList.add('result-vrai');

      recordExerciseProgress(PAGE_ID, { correct: 1, typed: 1, errors: 0, xp });
    } else {
      session.errors++;
      session.streak = 0;
      session.history.push('err');
      session.wrongOnes.push(q);

      fb.textContent = '❌ Incorrect !';
      fb.className   = 'vf-feedback err';
      card.classList.add('result-faux');

      card.classList.add('shake');
      setTimeout(() => card.classList.remove('shake'), 400);

      recordExerciseProgress(PAGE_ID, { correct: 0, typed: 1, errors: 1, xp: 0 });
    }

    showResult(q, isOk);
    showNextBtn();
    updateKPIs();
    renderStreakBar();
  }

  function showResult(q, isOk) {
    const box = document.getElementById('vfResult');
    box.textContent = q.explication;
    box.className   = 'vf-result ' + (isOk ? 'ok' : 'err');
  }

  function showNextBtn() {
    const btn = document.getElementById('btnNext');
    btn.style.display = 'inline-flex';
    btn.textContent   = session.index < session.questions.length - 1 ? 'Suivant' : 'Terminer';
  }

  /* ===== STREAK BAR ===== */
  function renderStreakBar() {
    const bar = document.getElementById('streakBar');
    bar.innerHTML = '';
    for (let i = 0; i < session.questions.length; i++) {
      const dot = document.createElement('div');
      dot.className = 'streak-dot' + (session.history[i] ? ' ' + session.history[i] : '');
      bar.appendChild(dot);
    }
  }

  /* ===== SUIVANT ===== */
  function nextQuestion() {
    if (!session.answered) return;
    session.index++;
    if (session.index >= session.questions.length) {
      finishSession();
    } else {
      loadQuestion();
    }
  }

  /* ===== FIN ===== */
  function finishSession() {
    promoteExerciseStatus(PAGE_ID, 'completed');

    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('gameZone').classList.add('hidden');
    document.getElementById('resultZone').classList.add('show');

    const accuracy = calcAccuracy(session.correct, session.typed);
    let emoji = '📚', title = 'Continue à t\'entraîner !';
    if (accuracy === 100) { emoji = '🏆'; title = 'Parfait ! Score 100% !'; }
    else if (accuracy >= 85) { emoji = '🎉'; title = 'Excellent !'; }
    else if (accuracy >= 70) { emoji = '👍'; title = 'Très bien !'; }
    else if (accuracy >= 50) { emoji = '😐'; title = 'Pas mal !'; }

    document.getElementById('resEmoji').textContent    = emoji;
    document.getElementById('resTitle').textContent    = title;
    document.getElementById('resSubtitle').textContent = session.correct + ' / ' + session.questions.length + ' corrects — ' + accuracy + '% de précision';
    document.getElementById('resCorrect').textContent  = session.correct;
    document.getElementById('resErrors').textContent   = session.errors;
    document.getElementById('resXP').textContent       = session.xp;
    document.getElementById('resBestStreak').textContent = session.bestStreak;

    // Récap des erreurs
    if (session.wrongOnes.length > 0) {
      const recap = document.getElementById('errorRecap');
      const list  = document.getElementById('errorList');
      recap.style.display = 'block';
      list.innerHTML = '';
      session.wrongOnes.forEach(q => {
        const item = document.createElement('div');
        item.style.cssText = 'padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);font-size:13px;';
        item.innerHTML = `<div style="color:var(--text);font-weight:600;margin-bottom:4px;">${q.statement}</div>
          <div style="color:var(--success);font-size:12px;">→ ${q.answer ? 'VRAI' : 'FAUX'} — ${q.explication}</div>`;
        list.appendChild(item);
      });
    }

    if (accuracy >= 80) launchConfetti();
  }

  /* ===== KPIs ===== */
  function updateKPIs() {
    document.getElementById('kpiCorrect').textContent = session.correct;
    document.getElementById('kpiErrors').textContent  = session.errors;
    document.getElementById('kpiXP').textContent      = session.xp;
    document.getElementById('kpiStreak').textContent  = session.streak + (session.streak >= 3 ? '🔥' : '');
  }

  /* ===== EVENTS ===== */
  document.addEventListener('DOMContentLoaded', () => {
    // Bouton "Exercice suivant recommandé"
        const btnNextEx = document.getElementById('btnNextExercise');
        const nextEx = getNextExercise(PAGE_ID);
        if (nextEx && nextEx.name && nextEx.href) {
          btnNextEx.addEventListener('click', () => {
            window.location.href = nextEx.href;
          });
          btnNextEx.textContent = 'Exercice suivant : ' + nextEx.name;
        } else {
          btnNextEx.style.display = 'none';
        }
        
    document.getElementById('btnVrai').addEventListener('click', () => answer(true));
    document.getElementById('btnFaux').addEventListener('click', () => answer(false));
    document.getElementById('btnNext').addEventListener('click', nextQuestion);
    document.getElementById('btnRestart').addEventListener('click', startSession);

    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT') return;
      const key = e.key.toLowerCase();
      if ((key === 'v' || key === 'ArrowLeft') && !session.answered) answer(true);
      else if ((key === 'f' || key === 'ArrowRight') && !session.answered) answer(false);
      else if (key === 'enter' && session.answered) nextQuestion();
    });

    startSession();
  });
  </script>
</body>
</html>
